[tool:pytest]
testpaths = tests
addopts =
    --cov
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-config=setup.cfg

[coverage:run]
include =
    tools/*
    noc-toolkit.py
omit =
    tests/*
    */__pycache__/*

[coverage:report]
show_missing = true
fail_under = 80
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    raise NotImplementedError

[coverage:html]
directory = htmlcov

[mutmut]
paths_to_mutate=tools/ticket-watch/ticket_watch.py
tests_dir=tests/
runner=python -m pytest tests/test_ticket_watch.py -x -q --tb=no
