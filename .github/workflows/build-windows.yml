name: Build Windows EXE

# Triggers: Manual button or on push to main
on:
  workflow_dispatch:  # Manual trigger via GitHub UI
  push:
    branches:
      - main
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'NOC-Toolkit.spec'
      - '.github/workflows/build-windows.yml'

jobs:
  build-windows:
    name: Build NOC-Toolkit.exe
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller NOC-Toolkit.spec --clean

      - name: Verify build
        run: |
          if (Test-Path "dist\NOC-Toolkit.exe") {
            Write-Host "✓ Build successful!"
            Get-Item "dist\NOC-Toolkit.exe" | Select-Object Name, Length
          } else {
            Write-Host "✗ Build failed - exe not found"
            exit 1
          }

      - name: Create release package
        run: |
          New-Item -ItemType Directory -Path "noc-toolkit-windows-release" -Force
          Copy-Item "dist\NOC-Toolkit.exe" "noc-toolkit-windows-release\"
          Copy-Item ".env.example" "noc-toolkit-windows-release\"
          Copy-Item "README.md" "noc-toolkit-windows-release\"
          Copy-Item "README_RU.md" "noc-toolkit-windows-release\"

          # Create run.bat
          @"
          @echo off
          echo ============================================
          echo NOC Toolkit for Windows
          echo ============================================
          echo.
          NOC-Toolkit.exe
          echo.
          echo ============================================
          pause
          "@ | Out-File -FilePath "noc-toolkit-windows-release\run.bat" -Encoding ASCII

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path "noc-toolkit-windows-release\*" -DestinationPath "noc-toolkit-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOC-Toolkit-Windows
          path: noc-toolkit-windows.zip
          retention-days: 30

      - name: Upload standalone EXE
        uses: actions/upload-artifact@v4
        with:
          name: NOC-Toolkit-exe-only
          path: dist/NOC-Toolkit.exe
          retention-days: 30
